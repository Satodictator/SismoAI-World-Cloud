name: SismoAI World Operations

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Tipo de operación"
        required: true
        default: "fast"
        type: choice
        options:
          - fast
          - daily
          - weekly
          - bootstrap
  schedule:
    - cron: "17 */6 * * *"
    - cron: "43 3 * * *"
    - cron: "29 4 * * 0"

permissions:
  contents: write
  actions: read
  pages: write
  id-token: write

concurrency:
  group: sismoai-world-state
  cancel-in-progress: false

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"
  SHARD_COUNT: "5"

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      mode: ${{ steps.mode.outputs.mode }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve operation mode
        id: mode
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_MODE: ${{ inputs.mode }}
          SCHEDULE_VALUE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            MODE="${DISPATCH_MODE:-fast}"
          elif [[ "$SCHEDULE_VALUE" == "29 4 * * 0" ]]; then
            MODE="weekly"
          elif [[ "$SCHEDULE_VALUE" == "43 3 * * *" ]]; then
            MODE="daily"
          else
            MODE="fast"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Modo resuelto: $MODE"

      - name: Restore persistent state branch
        run: bash scripts/prepare_state.sh state_input

      - name: Upload state input
        uses: actions/upload-artifact@v4
        with:
          name: state-input-${{ github.run_id }}
          path: state_input
          retention-days: 1
          if-no-files-found: error

  shard:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 330
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        shard: [0, 1, 2, 3, 4]
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pinned scientific dependencies
        run: |
          python -m pip install --disable-pip-version-check --upgrade pip
          python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Download persistent state
        uses: actions/download-artifact@v4
        with:
          name: state-input-${{ github.run_id }}
          path: state_input

      - name: Run regional shard
        env:
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
        run: |
          python -m sismoai_world.cli run-shard \
            --regions config/world_regions.json \
            --mode "${{ needs.prepare.outputs.mode }}" \
            --shard-index "${{ matrix.shard }}" \
            --shard-count "$SHARD_COUNT" \
            --state-dir state_input/state/regions \
            --runtime-root runtime \
            --output-root shard_output

      - name: Upload shard output
        uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.shard }}-${{ github.run_id }}
          path: shard_output
          retention-days: 1
          if-no-files-found: error

  aggregate:
    needs: [prepare, shard]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download previous state
        uses: actions/download-artifact@v4
        with:
          name: state-input-${{ github.run_id }}
          path: state_input

      - name: Download all shard outputs
        uses: actions/download-artifact@v4
        with:
          pattern: shard-*-${{ github.run_id }}
          path: collected
          merge-multiple: true

      - name: Build worldwide ranking and static dashboard
        run: |
          python -m sismoai_world.cli aggregate \
            --regions config/world_regions.json \
            --collected-results collected/results/regions \
            --state-results state_input/results/regions \
            --docs docs \
            --mode "${{ needs.prepare.outputs.mode }}"

      - name: Assemble compact persistent state
        run: |
          python scripts/build_state.py \
            --previous state_input \
            --collected collected \
            --world docs/data/world.json \
            --output state_publish \
            --retention-days 180

      - name: Publish one-commit state branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SISMOAI_MODE: ${{ needs.prepare.outputs.mode }}
        run: bash scripts/publish_state.sh state_publish

      - name: Append public prospective integrity ledger
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python scripts/update_ledger.py \
            --world docs/data/world.json \
            --manifest docs/data/manifest.json \
            --mode "${{ needs.prepare.outputs.mode }}" \
            --run-url "$RUN_URL" \
            --source-commit "${{ github.sha }}"
          git config user.name "sismoai-world-bot"
          git config user.email "sismoai-world-bot@users.noreply.github.com"
          git add audit/public_ledger.jsonl
          if ! git diff --cached --quiet; then
            git commit -m "audit: world result ${{ github.run_id }}"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    needs: aggregate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
